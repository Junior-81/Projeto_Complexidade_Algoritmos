services:
  postgres:
    image: postgres:16
    container_name: rotas_recife_db
    environment:
      POSTGRES_USER: rotas
      POSTGRES_PASSWORD: rotas
      POSTGRES_DB: rotas_recife
    ports:
      # Host 5433 para nao conflitar com outros Postgres locais na 5432.
      - "5433:5432"
    volumes:
      - rotas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotas -d rotas_recife"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rotas_pgdata:

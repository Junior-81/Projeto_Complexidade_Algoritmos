name: projeto_complexidade_algoritmos

services:
  postgres:
    image: postgres:16
    container_name: rotas_recife_db
    environment:
      POSTGRES_USER: rotas
      POSTGRES_PASSWORD: rotas
      POSTGRES_DB: rotas_recife
    ports:
      - "5433:5432"
    volumes:
      - rotas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotas -d rotas_recife"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: rotas_recife_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://rotas:rotas@postgres:5432/rotas_recife
      DATA_DIR: data/data
      GRAPH_TIMEOUT_SECONDS: "30"
    ports:
      - "8000:8000"
    volumes:
      # Persiste o grafo OSMnx (base + multimodal) entre restarts: so a
      # primeiríssima chamada paga o download/processamento (~1 min).
      - rotas_graphcache:/app/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  rotas_pgdata:
  rotas_graphcache:
